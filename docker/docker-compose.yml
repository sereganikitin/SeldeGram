services:
  postgres:
    image: postgres:16-alpine
    container_name: seldegram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seldegram
      POSTGRES_PASSWORD: seldegram_dev_password
      POSTGRES_DB: seldegram
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seldegram"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seldegram-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: seldegram-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: seldegram
      MINIO_ROOT_PASSWORD: seldegram_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: seldegram-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
