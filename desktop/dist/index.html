<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SeldeGram</title>
  <style>
    :root {
      --brand: #ff7a99;
      --brand-dark: #e84e76;
      --brand-darker: #ad1d50;
      --cream: #fff5f9;
      --cream-alt: #ffe8f0;
      --cream-border: #ffd4e1;
      --ink: #3d1a28;
      --ink-muted: #8c6471;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
      background: transparent;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(1200px 800px at 80% -10%, rgba(255, 122, 153, 0.35), transparent 60%),
        radial-gradient(900px 700px at -10% 110%, rgba(255, 182, 203, 0.4), transparent 60%),
        linear-gradient(135deg, var(--cream) 0%, var(--cream-alt) 100%);
    }
    .card {
      position: relative;
      padding: 44px 56px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 24px 60px -12px rgba(173, 29, 80, 0.22),
        0 4px 16px -4px rgba(173, 29, 80, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: rise 0.5s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 26px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 60%, var(--brand-darker) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -2px;
      box-shadow:
        0 14px 30px -6px rgba(232, 78, 118, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -2px 6px rgba(173, 29, 80, 0.3);
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    .name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--ink);
    }
    .hint {
      font-size: 13px;
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid var(--cream-border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">S</div>
    <div class="name">SeldeGram</div>
    <div class="hint">
      <div class="spinner"></div>
      <span>Подключение…</span>
    </div>
  </div>
  <script>
    setTimeout(function () {
      location.replace('https://app.pinkcrab.ru');
    }, 350);
  </script>
</body>
</html>
